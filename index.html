<!DOCTYPE html>
<html lang="en">
<head>
<title>Lego Hyrule</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<style>
body {
    font-family: Verdana, sans-serif;
    font-size: 12px;
    overflow: hidden;
}
</style>
</head>
<body>

<nav style="position: relative; display: flex; align-items: center; padding: 3px;">
  <div style="white-space: nowrap; z-index: 2;">
    <a href="https://threejs.org/">three.js</a> |
    <a href="https://ldraw.org/">LDraw.org</a>
  </div>
  <div style="position: absolute; left: 50%; transform: translateX(-50%);">
    <a href="?mapName=overworld">Overworld</a> |
    <a href="?mapName=caves">Caves</a> |
    <a href="?mapName=dungeons">Dungeons</a>
  </div>
</nav>

<script type="importmap">
    {
        "imports": {
            "three":         "/three/v0.180.0/build/three.module.js",
            "three/addons/": "/three/v0.180.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    "use strict";

    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'three/addons/libs/stats.module.js';
    import * as HyruleBuilder from "./HyruleBuilder.js";
    import * as PieceUtils from "./PieceUtils.js";
    import * as LookAngle from "./LookAngle.js";

    /** Read URL parameter options. */
    class Options {
        constructor() {
            const urlParams = new URLSearchParams(window.location.search);

            const setValue = (key, defaultValue, valueValidator, valueParser) => {
                const urlValue = urlParams.get(key);
                if (urlValue === null) {
                    this[key] = defaultValue;
                } else {
                    const parsedValue = valueParser(urlValue);
                    if (Number.isNaN(parsedValue)) {
                        console.log(`'${key}=${urlValue}' is NaN; using default ${defaultValue}`);
                        this[key] = defaultValue;
                    } else {
                        if (valueValidator == null || valueValidator(parsedValue)) {
                            console.log(`Setting url option '${key}=${parsedValue}'`);
                            this[key] = parsedValue;
                        } else {
                            console.log(`'${key}=${urlValue}' is not valid; using default ${defaultValue}`);
                            this[key] = defaultValue;
                        }
                    }
                }
            }

            const setString = (key, defaultValue, valueValidator) =>
                setValue(key, defaultValue, valueValidator, value => value);

            const setBool = (key, defaultValue, valueValidator) =>
                setValue(key, defaultValue, valueValidator, value => "true" === value);

            const setInt = (key, defaultValue, valueValidator) =>
                setValue(key, defaultValue, valueValidator, parseInt);

            const setFloat = (key, defaultValue, valueValidator) =>
                setValue(key, defaultValue, valueValidator, parseFloat);

            setBool("showGui", true);
            setString("upAxis", "Y");
            setInt("gapSize", 2);
            setString("mapName", "overworld", value => HyruleBuilder.getMapNames().includes(value));
            setBool("showSprites", true);
            setBool("showElevation", true);
            setBool("showLogo", "rotations" === this.mapName);
            setBool("showStats", false);
            setBool("antialias", true);
            setInt("clearColor", 0xD4EDFC);
            setString("palette", "nes", value => ["nes", "ldraw", "studio"].includes(value));
            setFloat("roughness", 1.0);
            setFloat("polygonOffsetFactor", 0.1);
            setBool("showLights", false);
            setBool("showPoi", false);
            setBool("showCameraTarget", false);

            setFloat("cameraFov", 45.0);
            setFloat("cameraOriginX");
            setFloat("cameraOriginY");
            setFloat("cameraOriginZ");
            setFloat("cameraTargetX");
            setFloat("cameraTargetY");
            setFloat("cameraTargetZ");
            setInt("viewWidth", 0);
            setInt("viewHeight", 0);
        }
    };
    const options = new Options();

    function viewWidth () {
        return options.viewWidth || window.innerWidth - 20;
    }

    function viewHeight() {
        return options.viewHeight || window.innerHeight - 40;
    }

    const minDistance = 1;
    const maxDistance = 10_000_000;
    const renderer = new THREE.WebGLRenderer({antialias: options.antialias});
    const camera = new THREE.PerspectiveCamera(options.cameraFov, viewWidth() / viewHeight(), 1, maxDistance);
    const controls = new OrbitControls(camera, renderer.domElement);
    const scene = new THREE.Scene();
    const stats = options.showStats ? new Stats() : null;

    function resizeView() {
        renderer.setSize(viewWidth(), viewHeight());
        camera.aspect = viewWidth() / viewHeight();
        camera.updateProjectionMatrix();
    }

    function makeGroup(visible) {
        const group = new THREE.Group();
        group.visible = visible;
        scene.add(group);
        return group;
    }

    function makeSphere(color, position, group) {
        const material = new THREE.MeshBasicMaterial({color: color})
        material.transparent = true;
        material.opacity = .5;
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(10), material);
        sphere.position.copy(position)
        group.add(sphere);
        return sphere;
    }

    const groupPoi = makeGroup(options.showPoi);
    const groupLights = makeGroup(options.showLights);
    const groupCameraTarget = makeGroup(options.showCameraTarget);
    const cameraTarget = makeSphere(0xff88ff, controls.target, groupCameraTarget);

    controls.addEventListener('change', () => {
        cameraTarget.position.copy(controls.target);
    });
    controls.minDistance = minDistance;
    controls.maxDistance = maxDistance;
    renderer.setClearColor(options.clearColor);
    renderer.setSize(viewWidth(), viewHeight());
    renderer.setAnimationLoop(function() {
        stats?.update();
        controls.update();
        renderer.render(scene, camera);
    });

    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', function() {
        resizeView();
    });

    // Lights.

    const lightConfigs = [
        {x:  60, y:  150, z:  80, intensity: 3, color: 0xff00ff, name: "magenta"},
        {x: -70, y: -120, z: -50, intensity: 3, color: 0xffff00, name: "yellow"},
    ].map(lightConfig =>  {
        const light = new THREE.DirectionalLight(0xffffff, lightConfig["intensity"]);
        light.position.set(lightConfig["x"], lightConfig["y"], lightConfig["z"]);
        scene.add(light);

        const sphere = makeSphere(lightConfig["color"], lightConfig, groupLights);
        return {light: light, sphere: sphere, name: lightConfig["name"]};
    });

    // Get map data.

    const mapData = await HyruleBuilder.getMapData(options.mapName, options.gapSize, options.showSprites, options.showElevation);

    // Set initial camera position.  If any camera override options are found then create a custom GUI POI entry.
    const [guiPoiDefault, guiPoi] =
        [
            options.cameraOriginX, options.cameraOriginY, options.cameraOriginZ,
            options.cameraTargetX, options.cameraTargetY, options.cameraTargetZ
        ].some(value => value != null)
        ? [
            "Custom",
            {
                "Custom": {
                    origin: {
                        x: options.cameraOriginX ?? mapData.home.origin.x,
                        y: options.cameraOriginY ?? mapData.home.origin.y,
                        z: options.cameraOriginZ ?? mapData.home.origin.z,
                    },
                    target: {
                        x: options.cameraTargetX ?? mapData.home.target.x,
                        y: options.cameraTargetY ?? mapData.home.target.y,
                        z: options.cameraTargetZ ?? mapData.home.target.z,
                    },
                }
            }
        ]
        : ["Home", {}];
    Object.freeze(Object.assign(guiPoi, {Home: mapData.home, ...mapData.pointsOfInterest}));

    camera.position.copy(guiPoi[guiPoiDefault].origin);
    controls.target.copy(guiPoi[guiPoiDefault].target);

    // Add map data pieces.
    const pieceInstances = await PieceUtils.addPiecesToScene(
        mapData.pieces, scene, options.showLogo, options.roughness, options.polygonOffsetFactor, options.palette);

    Object.values(mapData.pointsOfInterest).forEach(poi => {
        for (const [color, position] of [
            ['red', poi.target],
            ['blue', poi.origin],
        ]) {
            makeSphere(color, position, groupPoi);
        }
    });

    // Create GUI options.

    const gui = options.showGui ? new GUI().close() : null;
    if (gui) {

        // Add GUI POI.

        gui.add({name: guiPoiDefault}, "name", Object.keys(guiPoi))
            .name("Points of Interest")
            .onChange(name => {
                const poi = guiPoi[name];
                controls.target.copy(poi.target);
                camera.position.copy(poi.origin);
            });

        // Add GUI exports.

        gui.add(options, 'upAxis', {
            "Y up (Three.js)": "Y",
            "Z up (3D Printer)": "Z"
        }).name("OBJ Coordinate System");

        const getFileBaseName = () => `hyrule-${options.mapName}-${options.palette}`;

        const addExport = (exportName, mimeType, extension, getData) => {
            const guiExportDefaultName = `Export ${exportName}`;
            const guiExport = gui.add({exportButton() {
                guiExport.disable();

                setTimeout(async () => {
                    try {
                        const fileBaseName = getFileBaseName();
                        const startTime = window.performance.now();
                        const data = await getData(fileBaseName, async (message) => {
                            guiExport.name(`Working... ${message}`);
                            await new Promise(resolve => setTimeout(resolve, 0));
                        });
                        const elapseTime = window.performance.now() - startTime;
                        console.log(`Get data took: ${elapseTime / 1000} ms`);
                        downloadBlob(new Blob([data], {type: mimeType}), `${fileBaseName}.${extension}`);
                    } catch (error) {
                        console.error("Export failed:", error);
                    } finally {
                        guiExport.name(guiExportDefaultName);
                        guiExport.enable();
                    }
                }, 10);
            }}, "exportButton").name(guiExportDefaultName);
        };

        addExport("OBJ", "application/gzip", "tar.gz", async (fileBaseName, onProgress) => {
            return await pieceInstances.getObjData(fileBaseName, options.upAxis === "Y", onProgress);
        });

        addExport("LDR", "application/x-ldraw", "ldr", async (fileBaseName, onProgress) => {
            return await pieceInstances.getLdrData(fileBaseName, options.palette, onProgress);
        });

        // Add GUI screenshot.

        gui.add({screenshot() {
            renderer.render(scene, camera, null, false);
            renderer.domElement.toBlob((blob) => {
                downloadBlob(blob, `${getFileBaseName()}.png`);
            });
        }}, "screenshot").name("Screenshot");

        // Add GUI color options.

        gui.add(options, 'palette', {nes: 'nes', ldraw: 'ldraw', studio: 'studio'})
            .name('Color Palette')
            .onChange(value => pieceInstances.changePalette(value));

        gui.add(options, 'clearColor', {
            'nes 1D Black': 0x000000,
            'nes 2D Dark Gray': 0x787878,
            'nes 3D Gray':  0xC4C4C4,

            'nes 22 Lavender': 0x5C94FC,
            'nes 31 Pale Blue': 0xA8E4FC,
            'nes 3C Pale Grey-Blue': 0x9CFCF0,

            'ldraw 9 Light Blue': 0x97CBD9,
            'ldraw 323 Light Aqua': 0xD3F2EA,

            'Light Gray': 0xDDDDDD,
            'Very Pale Grey-Blue': 0xDDEDEE,
            'Instruction Manual': 0xD4EDFC,
        })
            .name('Clear Color')
            .onChange(value => renderer.setClearColor(value));

        // Add copy camera URL.

        const guiCameraUrlDefaultName = "Copy Camera URL to Clipboard";
        const guiCameraUrl = gui.add({copyCameraURL() {
            const urlParams = new URLSearchParams(window.location.search);

            for (const [key, value] of [
                ["cameraOriginX", camera.position.x.toFixed(2)],
                ["cameraOriginY", camera.position.y.toFixed(2)],
                ["cameraOriginZ", camera.position.z.toFixed(2)],
                ["cameraTargetX", controls.target.x.toFixed(2)],
                ["cameraTargetY", controls.target.y.toFixed(2)],
                ["cameraTargetZ", controls.target.z.toFixed(2)],
                ["viewWidth", options.viewWidth.toFixed(2)],
                ["viewHeight", options.viewHeight.toFixed(2)],
            ]) {
                urlParams.delete(key);
                urlParams.set(key, value);
            }

            const cameraUrl = `${window.location.origin}${window.location.pathname}?${urlParams}`;
            console.log(`Camera URL: ${cameraUrl}`);

            navigator.clipboard.writeText(cameraUrl).then(() => {
                guiCameraUrl.name("Copied!");
                setTimeout(() => guiCameraUrl.name(guiCameraUrlDefaultName), 1000);
            });
        }}, "copyCameraURL").name(guiCameraUrlDefaultName);

        // Add GUI camera controls.

        const lookAngle = new LookAngle.LookAngle(camera, controls);
        controls.addEventListener('change', lookAngle.updateLookAngle);

        const guiCameraOrigin = gui.addFolder('Camera Origin');
        guiCameraOrigin.add(camera.position, 'x', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);
        guiCameraOrigin.add(camera.position, 'y', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);
        guiCameraOrigin.add(camera.position, 'z', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);

        const guiCameraTarget = gui.addFolder('Camera Target');
        guiCameraTarget.add(controls.target, 'x', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);
        guiCameraTarget.add(controls.target, 'y', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);
        guiCameraTarget.add(controls.target, 'z', -4000, 4000)      .step(0.1).listen().onChange(lookAngle.updateLookAngle);

        const guiCameraLookAngle = gui.addFolder('Camera Look Angle');
        guiCameraLookAngle.add(lookAngle, 'anchor', ['camera', 'target'])              .onChange(lookAngle.updateLookAngle);
        guiCameraLookAngle.add(lookAngle, 'polarAngle', 0, 180)     .step(0.1).listen().onChange(lookAngle.updateCamera);
        guiCameraLookAngle.add(lookAngle, 'azimuthAngle', -180, 180).step(0.1).listen().onChange(lookAngle.updateCamera);
        guiCameraLookAngle.add(lookAngle, 'distance', 0.1, 10000)   .step(0.1).listen().onChange(lookAngle.updateCamera);

        const guiCameraSize = gui.addFolder('Camera Size');
        guiCameraSize.add(options, 'viewWidth',  0, 10000).step(1).onChange(value => resizeView());
        guiCameraSize.add(options, 'viewHeight', 0,  3000).step(1).onChange(value => resizeView());

        // Add toggles forlines, POI, camera target.

        gui.add({resetY() {
            const origin = camera.position;
            const target = controls.target;

            const dx = target.x - origin.x;
            const dy = target.y - origin.y;
            const dz = target.z - origin.z;

            if (Math.abs(dy) > 0.05) {
                const distanceRatio = -origin.y / dy;
                target.set(origin.x + (distanceRatio * dx), 0, origin.z + (distanceRatio * dz));
            }

        }}, "resetY").name("Reset Target to Ground");
        gui.add({toggle() { groupCameraTarget.visible =! groupCameraTarget.visible; }}, "toggle").name("Toggle Camera Target");
        gui.add({toggle() { groupPoi.visible =! groupPoi.visible; }}, "toggle").name("Toggle POI");
        gui.add({toggleLines() {
            scene.traverse(item => {
                if (item.isLine) {
                    item.visible = !item.visible;
                }
            });
        }}, "toggleLines").name("Toggle Lines");

        // Add GUI material options.

        const guiMaterial = gui.addFolder('Materials');
        guiMaterial.add(options, 'roughness', 0, 1).step(0.01).onChange(value => {
            scene.traverse(item => {
                if (item.isMesh && item.material.isMeshStandardMaterial) {
                    item.material.roughness = value;
                }
            });
        });
        guiMaterial.add(options, 'polygonOffsetFactor', 0, 1).step(0.01).onChange(value => {
            scene.traverse(item => {
                if (item.isMesh && item.material.isMeshStandardMaterial) {
                    item.material.polygonOffset = value !== 0;
                    item.material.polygonOffsetFactor = value;
                }
            });
        });

        // Add GUI light controls.

        gui.add({toggle() { groupLights.visible =! groupLights.visible; }}, "toggle").name("Toggle Lights");
        lightConfigs.forEach((lightConfig, lightIndex) => {
            const guiLight = gui.addFolder(`Light ${lightIndex} - ${lightConfig.name}`).close();
            ["x", "y", "z"].forEach(position => {
                guiLight
                    .add(lightConfig.light.position, position, -2500, 2500)
                    .step(1).listen()
                    .onChange(value => lightConfig.sphere.position[position] = value);
            });
            guiLight.add(lightConfig.light, 'intensity', 0, 30).step(0.5).listen();
        });
    }

    if (stats) {
        document.body.appendChild(stats.dom);
        requestAnimationFrame(() => {
            const right = gui
                ? window.innerWidth - gui.domElement.getBoundingClientRect().left + 2
                : 0;
            stats.dom.style.right = `${right}px`;
            stats.dom.style.left = 'auto';
        });
    }

    function downloadBlob(blob, filename) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }

</script>
</body>
</html>
