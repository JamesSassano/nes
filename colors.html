<!DOCTYPE html>
<html lang="en">
<head>
    <title>NES to LDraw Palette</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Verdana, sans-serif;
            font-size: 10px;
            background: #111;
            color: #eee;
        }
        table {
            border-spacing: 4px;
            width: 100%;
            table-layout: fixed;
        }
        th {
            border: 1px solid #333;
            padding: 10px;
        }
        td {
            border: 1px solid #333;
            height: 30px;
            vertical-align: top;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            padding: 1px;
        }
        .color-code { font-family: monospace; }

        .ldraw-swatch {
            margin: 4px;
            height: 30px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ldraw-info { font-size: 9px; line-height: 1.0; }

        .alternative-ldraw-swatch {
            min-width: 12px;
            font-size: 7px;
            border: 1px solid rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }

        .alternative-ldraw-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
        }

    </style>
</head>
<body>
    <script type="module">
        "use strict";
        import {LDrawColors, StudioColors, NESColor} from './Colors.js';

        const getHexColor = (color) => `#${color.colorInt.toString(16).toUpperCase().padStart(6, '0')}`;
        const getHexCode = (color) => `0x${color.colorCode.toString(16).toUpperCase().padStart(2, '0')}`;
        const getName = (color) => color.colorName.toLowerCase().replace(/_/g, ' ');

        /** Sets the background and a contrasting foreground and returns the background hex string. */
        const setElementColors = (element, color) => {
            const r = (color.colorInt >> 16) & 0xff;
            const g = (color.colorInt >> 8) & 0xff;
            const b = color.colorInt & 0xff;
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            const foreground = brightness > 128 ? '#000' : '#fff';

            const colorHex = getHexColor(color);
            element.style.backgroundColor = colorHex;
            element.style.color = foreground;
            return colorHex;
        };

        const updateLDrawSwatch = (colors, swatch, ldrawCode) => {
            const ldrawColor = colors[ldrawCode];
            const ldrawHex = setElementColors(swatch, ldrawColor);

            swatch.innerHTML = `
                <span class="ldraw-info">
                    <span class="color-code">[${ldrawColor.colorCode}&nbsp;${ldrawHex}]</span><br>
                    ${getName(ldrawColor)}
                </span>
            `;
        };

        const addHeader = (table, title) => {
            const headerNames = [
                "Neutrals", "Blue", "Violet", "Purple", "Pink", "Red", "Orange", "Tan",
                "Brown", "Yellow", "Lime", "Green", "Cyan", "Neutrals", "Black", "Black"
            ];

            const sectionRow = document.createElement('tr');
            const sectionCell = document.createElement('th');
            sectionCell.colSpan = headerNames.length;
            sectionCell.innerHTML = title;
            sectionRow.appendChild(sectionCell);
            table.appendChild(sectionRow);

            const headerRow = document.createElement('tr');
            for (const headerName of headerNames) {
                const headerCell = document.createElement('th');
                headerCell.innerHTML = headerName;
                headerRow.appendChild(headerCell);
            }
            table.appendChild(headerRow);
        };

        const table = document.createElement('table');

        addHeader(table, "NES Colors with LDraw swatch");

        for (let i = 0; i < 4; ++i) {
            const nesRow = document.createElement('tr');
            for (let j = 0; j < 16; ++j) {
                const nesCell = document.createElement('td');
                const nesColor = NESColor[i * 16 + j];
                const nesHexColor = setElementColors(nesCell, nesColor);

                const ldrawSwatch = document.createElement('span');
                ldrawSwatch.className = "ldraw-swatch";
                updateLDrawSwatch(LDrawColors, ldrawSwatch, nesColor.ldrawCode);

                const ldrawAltContainer = document.createElement('span');
                ldrawAltContainer.className = "alternative-ldraw-container";

                const studioSwatch = document.createElement('span');
                studioSwatch.className = "ldraw-swatch";
                updateLDrawSwatch(StudioColors, studioSwatch, nesColor.studioCode);

                const studioAltContainer = document.createElement('span');
                studioAltContainer.className = "alternative-ldraw-container";

                if (nesColor.ldrawAlternativeCodes.length > 0) {
                    [nesColor.ldrawCode, ...nesColor.ldrawAlternativeCodes].forEach(alternativeLDrawCode => {
                        const alternativeLDrawColor = LDrawColors[alternativeLDrawCode];
                        const alternativeLDrawButton = document.createElement('span');
                        setElementColors(alternativeLDrawButton, alternativeLDrawColor);
                        alternativeLDrawButton.className = "alternative-ldraw-swatch";
                        alternativeLDrawButton.innerText = alternativeLDrawCode;
                        alternativeLDrawButton.title = getName(alternativeLDrawColor);
                        alternativeLDrawButton.onclick = (ev) => {
                            ev.stopPropagation();
                            updateLDrawSwatch(LDrawColors, ldrawSwatch, alternativeLDrawCode);
                        };

                        ldrawAltContainer.appendChild(alternativeLDrawButton);
                    });
                }

                if (nesColor.studioAlternativeCodes.length > 0) {
                    [nesColor.studioCode, ...nesColor.studioAlternativeCodes].forEach(alternativeStudioCode => {
                        const alternativeStudioColor = StudioColors[alternativeStudioCode];
                        const alternativeStudioButton = document.createElement('span');
                        setElementColors(alternativeStudioButton, alternativeStudioColor);
                        alternativeStudioButton.className = "alternative-ldraw-swatch";
                        alternativeStudioButton.innerText = alternativeStudioCode;
                        alternativeStudioButton.title = getName(alternativeStudioColor);
                        alternativeStudioButton.onclick = (ev) => {
                            ev.stopPropagation();
                            updateLDrawSwatch(StudioColors, studioSwatch, alternativeStudioCode);
                        };

                        studioAltContainer.appendChild(alternativeStudioButton);
                    });
                }

                nesCell.innerHTML = `
                    <span class="color-code">[${getHexCode(nesColor)}&nbsp${nesHexColor}]</span><br>
                    ${getName(nesColor)}
                `;
                nesCell.appendChild(ldrawSwatch);
                nesCell.appendChild(ldrawAltContainer);
                nesCell.appendChild(studioSwatch);
                nesCell.appendChild(studioAltContainer);
                nesRow.appendChild(nesCell);

            }
            table.appendChild(nesRow);
        }

        const ldrawCodeTable = [
            [null,  null,   23,     85,    26,   320,   484,   128,   308,  null,  null,  null,  null,  null,  null, null],
            [null,   272,  110,     22,     5,   216,   402,    84,     6,  null,  null,  null,  null,     0,  null, null],
            [null,     1,   89,     69, 10022,     4,   366,    92,    70,   180,  null,   288,     3,     8,  null, null],
            [null,   213,  219,    431,   351,   335,    25,   371,   423,   424,   330,     2,   321,    72,  null, null],
            [null,   379,  112,    373,   430, 10017,   508,   509,   370,    14,    27,   378,    11,     7,  null, null],
            [null,    73,  220,    218,   295,   123,   462,   225,    86,    18,   115,    10,   322,    71,  null, null],
            [null,   212,   20,     30,    29,    12,   121,    19,   422,   226,  null,    74,   232,   503,  null, null],
            [null,     9, null,     31,    13,   353,   125,    68,    28, 10015,   120,    17,   118,   151,  null, null],
            [null,   313, null,   null,    77,   100,   191,    78,   450,   368,   326,   510,   323,    15,  null, null]
        ];

        const studioCodeTable = [
            [null, null,  null,  null,  null,  null,   null,  484,   308,  null,  null,  null,    3,  null,   null,  null],
            [null,  272,    85,    22,    26,   320, 100167,  128,    70,  null,  null,  null,  321,     0,   null,  null],
            [null,   23,   110,   373,     5,   216,    509,   28,     6,   424,   330,   288,   11,     8,   null,  null],
            [null,    1,   431,    69,   351,     4,    508,   92,   423,100003,   115,     2,  313,    72,   null,  null],
            [null,  379,    89,   219,   430,   335,     25,  371,    86,   191,    27,    10,  232,     7,   null,  null],
            [null,   73,   112,    30,    13,    12,    366,   84,   370,    14,   120,   378,  322,    71,   null,  null],
            [null,  212,    20,   218,   295,100007,    507,   19,   422,    18,  null,    74, null,   503,   null,  null],
            [null,    9,  null,    31,    29,   353,    462,   68,   450,   226,100009,    17,  118,   151,   null,  null],
            [null, null,  null,  null,    77,   100,    125,   78,  null,   368,   326,   510,  323,    15,   null,  null]
        ];

        const getOklch = (rgbInt) => {
            const linearize = c => c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            const linearR = linearize(((rgbInt >> 16) & 0xff) / 255);
            const linearG = linearize(((rgbInt >>  8) & 0xff) / 255);
            const linearB = linearize(( rgbInt        & 0xff) / 255);
            const lCone = Math.cbrt(0.4122214708 * linearR + 0.5363320963 * linearG + 0.0514459440 * linearB);
            const mCone = Math.cbrt(0.2119034982 * linearR + 0.6806995451 * linearG + 0.1073990560 * linearB);
            const sCone = Math.cbrt(0.0883024619 * linearR + 0.2817188376 * linearG + 0.6299787005 * linearB);
            const L = 0.2104542553 * lCone + 0.7936177850 * mCone - 0.0040720468 * sCone;
            const a = 1.9779984951 * lCone - 2.4285922050 * mCone + 0.4505937099 * sCone;
            const b = 0.0259040371 * lCone + 0.7827717662 * mCone - 0.8086757660 * sCone;
            const C = Math.sqrt(a * a + b * b);
            const h = ((Math.atan2(b, a) * 180 / Math.PI) + 360) % 360;
            return {L, C, h, a, b};
        };

        for (const [name, colors, codeTable] of [
            ["LDraw", LDrawColors, ldrawCodeTable],
            ["Studio", StudioColors, studioCodeTable],
        ]) {
            addHeader(table, `${name} Colors`);

            for (const colorCodeRow of codeTable) {
                const colorRow = document.createElement('tr');
                for (const colorCode of colorCodeRow) {
                    const colorCell = document.createElement('td');
                    if (null !== colorCode) {
                        const color = colors[colorCode];
                        const hex = setElementColors(colorCell, color);
                        const oklch = getOklch(color.colorInt);
                        const hue = oklch.h.toFixed(0);
                        const lightness = oklch.L.toFixed(2);
                        colorCell.innerHTML = `
                            <span class="color-code">[${colorCode}&nbsp;${hex}]</span>
                            <br>${getName(color)}
                            <br><span style="font-size: 8px; opacity: 0.8;">H: ${hue}, L: ${lightness}</span>`;
                    }
                    colorRow.appendChild(colorCell);
                }
                table.appendChild(colorRow);
            }
        }

        document.body.appendChild(table);

    </script>
</body>
</html>
